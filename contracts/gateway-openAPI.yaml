openapi: 3.0.3

info:
  title: Amazon Order Processing API Gateway
  version: 1.0.0
  description: Public entry point for order processing system

servers:
  - url: http://localhost:3000

tags:
  - name: Orders
  - name: Products
  - name: Billing Accounts

paths:

  # =====================================================
  # ORDERS
  # =====================================================

  /api/v1/orders:
    post:
      tags: [Orders]
      summary: Create a new order
      description: Creates an order and starts the Saga workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSummary'

    get:
      tags: [Orders]
      summary: List orders
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: status
          in: query
          description: Filter by order status
          schema:
            type: array
            items:
              $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderSummary'

  /api/v1/orders/{orderId}:
    get:
      tags: [Orders]
      summary: Get order by ID
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetails'
        '404':
          description: Order not found


  # =====================================================
  # PRODUCTS (OPTIONAL CATALOG VIEW)
  # =====================================================

  /api/v1/products:
    get:
      tags: [Products]
      summary: List available products
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Product catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'


  # =====================================================
  # BILLING ACCOUNTS (READ ONLY)
  # =====================================================

  /api/v1/billing-accounts:
    get:
      tags: [Billing Accounts]
      summary: List billing accounts
      responses:
        '200':
          description: Billing accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BillingAccount'


# =====================================================
# COMPONENTS
# =====================================================

components:

  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:

    # =================================================
    # ORDER CREATION
    # =================================================

    CreateOrderRequest:
      type: object
      required:
        - customer_id
        - billing_account_id
        - products
        - shipping_address
        - billing_address
      properties:
        customer_id:
          type: string
          format: uuid
        billing_account_id:
          type: string
          format: uuid
        billing_address:
          type: string
        shipping_address:
          type: string
        currency:
          type: string
          example: INR
        products:
          type: array
          items:
            $ref: '#/components/schemas/OrderProduct'

    OrderProduct:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer

    # =================================================
    # ORDER RESPONSES
    # =================================================

    OrderSummary:
      type: object
      properties:
        order_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        total_amount:
          type: number
        currency:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        created_at:
          type: string
          format: date-time

    OrderDetails:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            billing_account_id:
              type: string
              format: uuid
            billing_address:
              type: string
            shipping_address:
              type: string
            products:
              type: array
              items:
                $ref: '#/components/schemas/OrderProduct'
            shipping_label:
              $ref: '#/components/schemas/ShippingLabel'

    # =================================================
    # ORDER STATUS (SAGA STATES)
    # =================================================

    OrderStatus:
      type: string
      enum:
        - CREATED
        - BILLING_REQUESTED
        - BILLED
        - BILLING_FAILED
        - SHIPPING_REQUESTED
        - SHIPPED
        - REFUND_REQUESTED
        - REFUNDED
        - CANCELLED

    # =================================================
    # SHIPPING LABEL
    # =================================================

    ShippingLabel:
      type: object
      properties:
        shipping_label_id:
          type: string
          format: uuid
        tracking_number:
          type: string
        status:
          type: string
          enum: [CREATED, FAILED, SHIPPED]

    # =================================================
    # PRODUCT
    # =================================================

    Product:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        product_url:
          type: string
        price:
          type: number
        quantity_on_hand:
          type: integer

    # =================================================
    # BILLING ACCOUNT
    # =================================================

    BillingAccount:
      type: object
      properties:
        billing_account_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        available_balance:
          type: number
        currency:
          type: string